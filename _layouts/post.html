<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} - casey</title>
    <style>
      @font-face {
        font-family: "coda";
        src: url("/fonts/CMMCodaKMCustom-Proportional.woff");
      }
      @font-face {
        font-family: "coda";
        src: url("/fonts/CMMCodaKMCustom-ProportionalItalic.woff");
        font-style: italic;
      }
      @font-face {
        font-family: "codamono";
        src: url("/fonts/CMMCodaKMCustom-MonoSans.woff");
      }

      html, body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "coda", sans-serif;
        font-size: 18px;
        display: flex;
        justify-content: center;
        padding: 50px 10px;
      }

      a {
        color: black;
      }

      .post {
        max-width: 700px;
        width: 100%;
        padding: 40px;
      }

      .post-header {
        margin-bottom: 30px;
      }

      .post-title {
        font-size: 24px;
        font-weight: bold;
        margin: 0 0 5px 0;
      }

      .post-date {
        font-size: 14px;
        color: #666;
      }

      .post-content p, .post-content li {
        line-height: 1.4;
        margin: 15px 0;
      }

      .post-content h2 {
        margin-top: 30px;
      }

      .post-content code {
        font-family: "codamono", monospace;
        background: #f5f5f5;
        padding: 2px 5px;
      }

      .post-content pre {
        background: #f5f5f5;
        padding: 15px;
        overflow-x: auto;
        border: 1px solid #ddd;
      }

      .post-content pre code {
        background: none;
        padding: 0;
      }

      .post-content img {
        max-width: 100%;
        height: auto;
      }

      .post-content .footnotes {
        border-top: 1px solid #ddd;
        margin-top: 40px;
        padding-top: 20px;
        font-size: 14px;
      }

      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        font-size: 14px;
        color: #666;
      }

      @media (max-width: 768px) {
        .post {
          padding: 20px 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="post">
      <a class="back-link" href="/posts/">← back to posts</a>
      <div class="post-header">
        <div class="post-title">{{ page.title }}</div>
        <div class="post-date">{{ page.date | date: "%B %-d, %Y" }}</div>
      </div>
      <div class="post-content">
        {{ content }}
      </div>
    </div>
  </body>
</html>
